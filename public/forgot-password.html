<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — EscoConcepts Travels</title>
<meta name="description" content="Reset your password. Enter your email and we'll send you a link to create a new password.">
<meta name="keywords" content="forgot password, reset password, account recovery">
<meta name="author" content="EscoConcepts Travels">
<meta property="og:title" content="Forgot Password | EscoConcepts Travels">
<meta property="og:description" content="Reset your account password.">
<meta property="og:image" content="https://esconcepts-travels.onrender.com/images/og-image.jpg">
<meta property="og:url" content="https://esconcepts-travels.onrender.com/forgot-password.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Forgot Password | EscoConcepts Travels">
<meta name="twitter:description" content="Password recovery.">
<meta name="twitter:image" content="https://esconcepts-travels.onrender.com/images/og-image.jpg">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Forgot Password",
  "description": "Password recovery page.",
  "url": "https://esconcepts-travels.onrender.com/forgot-password.html"
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="ui.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E🐘%3C/text%3E%3C/svg%3E">
<script src="config.js"></script>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="logo" href="index.html">Esco<span>Concepts</span></a>
    <button class="nav-toggle">&#9776;</button>
    <nav class="nav">
      <a href="index.html">Home</a><a href="packages.html">Packages</a><a href="destinations.html">Destinations</a>
      <a href="about.html">About Us</a><a href="blog.html">Blog</a><a href="contact.html">Contact</a>
      <a href="account.html">Account</a><a href="packages.html" class="btn btn-gold">Book a Safari</a>
    </nav>
  </div>
</header>

<section style="padding-top:8rem">
  <div class="container">
    <div class="auth-card">
      <h2 style="text-align:center">Forgot Password</h2>
      <p style="text-align:center;color:var(--ink-soft)">Enter your email and we'll send you a reset link.</p>
      <form id="f">
        <div class="form-field"><label>Email</label><input type="email" name="email" required class="input"></div>
        <div id="msg"></div>
        <button class="btn btn-gold btn-block">Send reset link</button>
        <p style="text-align:center;margin-top:1rem"><a href="account.html" style="color:var(--gold-dark)">← Back to login</a></p>
      </form>
    </div>
  </div>
</section>

<script src="ui.js"></script>
<script>
  function showAlert(el, msg, kind = "error") { if (!el) return; el.innerHTML = `<div class="alert ${kind}">${escapeHtml(msg)}</div>`; if (kind === "success") setTimeout(() => { el.innerHTML = ""; }, 6000); }
  const form = document.getElementById("f");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = form.email.value;
    try {
      const res = await fetch("/api/auth/forgot-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Failed");
      showAlert(document.getElementById("msg"), "If that email exists, a reset link has been sent.", "success");
    } catch(err) { showAlert(document.getElementById("msg"), err.message); }
  });
</script>
</body>
</html>
