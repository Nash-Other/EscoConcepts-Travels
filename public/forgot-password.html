<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Reset Password",
  "description": "Password reset page.",

}

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="ui.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E🐘%3C/text%3E%3C/svg%3E">
<script src="config.js"></script>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="logo" href="index.html">Esco<span>Concepts</span></a>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="packages.html">Packages</a>
      <a href="destinations.html">Destinations</a>
      <a href="about.html">About Us</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
      <a href="account.html">Account</a>
      <a href="packages.html" class="btn btn-gold">Book a Safari</a>
    </nav>
  </div>
</header>

<section style="padding-top:8rem">
  <div class="container">
    <div class="auth-card">
      <h2 style="text-align:center">Reset Password</h2>
      <form id="f">
        <div class="form-field"><label>New password (min 8)</label><input type="password" name="password" minlength="8" required class="input"></div>
        <div class="form-field"><label>Confirm password</label><input type="password" name="confirm" minlength="8" required class="input"></div>
        <div id="msg"></div>
        <button class="btn btn-gold btn-block">Reset password</button>
      </form>
    </div>
  </div>
</section>

<script src="ui.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get("token");
  const form = document.getElementById("f");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = document.getElementById("msg");
    const password = form.password.value, confirm = form.confirm.value;
    if (password !== confirm) return showAlert(msg, "Passwords do not match.");
    if (!token) return showAlert(msg, "Missing reset token.");
    try {
      const res = await fetch("/api/auth/reset-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token, newPassword: password }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Reset failed");
      showAlert(msg, "Password updated. You can now log in.", "success");
    } catch(err) { showAlert(msg, err.message); }
  });
</script>
</body>
</html>
