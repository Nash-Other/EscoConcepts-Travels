<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EscoConcepts Travels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7f6; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .container { max-width: 450px; width: 100%; background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 1rem; }
        input, button { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { background: #e67e22; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #d35400; }
        .error { color: #e74c3c; margin-bottom: 1rem; }
        .success { color: #2ecc71; margin-bottom: 1rem; }
        .back-link { text-align: center; margin-top: 1rem; }
        .back-link a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Forgot Password</h2>
    <p>Enter your email address and we will send you a link to reset your password.</p>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    <form id="forgotForm">
        <input type="email" id="email" placeholder="Your email address" required>
        <button type="submit">Send Reset Link</button>
    </form>
    <div class="back-link">
        <a href="account.html">Back to Login</a>
    </div>
</div>

<script>
    const form = document.getElementById('forgotForm');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.innerText = '';
        successDiv.innerText = '';
        const email = document.getElementById('email').value.trim();
        if (!email) {
            errorDiv.innerText = 'Please enter your email address.';
            return;
        }
        try {
            const response = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await response.json();
            if (data.success) {
                successDiv.innerHTML = data.message + '<br>Check the server logs for the reset link (email sending is disabled for now).';
            } else {
                errorDiv.innerText = data.message;
            }
        } catch (err) {
            errorDiv.innerText = 'Server error. Please try again later.';
        }
    });
</script>
</body>
</html>
