<!DOCTYPE html>
<html>
<head>
    <title>Admin Login Test</title>
</head>
<body>
    <h2>Admin Login Test</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" value="admin@escoconcepts.com">
        <input type="password" id="loginPassword">
        <button type="submit">Login</button>
    </form>
    <div id="message"></div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = 'Logging in...';
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    msgDiv.innerText = 'Login successful! Token: ' + data.token.substring(0, 20) + '...';
                } else {
                    msgDiv.innerText = 'Login failed: ' + data.message;
                }
            } catch (err) {
                msgDiv.innerText = 'Error: ' + err.message;
            }
        });
    </script>
</body>
</html>
