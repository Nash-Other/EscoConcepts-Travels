<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — EscoConcepts Travels</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="ui.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E🐘%3C/text%3E%3C/svg%3E">
</head>
<body style="background:var(--bg)">

<!-- Login View -->
<div id="login-view" style="display:none;min-height:100vh;display:flex;align-items:center">
  <div class="container">
    <div class="card" style="max-width: 460px; margin: 0 auto;">
      <div class="card-header">
        <h2 class="card-title" style="text-align:center">Admin Login</h2>
      </div>
      <div class="card-content">
        <form id="admin-login">
          <div class="form-field"><label>Email</label><input type="email" name="email" required class="input"></div>
          <div class="form-field"><label>Password</label><input type="password" name="password" required class="input"></div>
          <div id="login-msg"></div>
          <button class="btn btn-primary btn-block" type="submit">Log in</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="dash" style="display:none">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <span class="logo">Esco<span style="color:var(--gold)">Concepts</span> Admin</span>
      <button data-tab="bookings" class="active">Bookings</button>
      <button data-tab="services">Destinations</button>
      <button data-tab="contacts">Messages</button>
      <button data-tab="blogs">Blogs</button>
      <button id="admin-logout" style="margin-top:2rem;color:#e6b422">Log out</button>
    </aside>
    <main class="admin-main">
      <!-- Bookings Tab -->
      <section id="tab-bookings">
        <h2>Bookings</h2>
        <div class="toolbar">
          <input id="b-search" placeholder="Search reference, guest name, email" class="input">
          <select id="b-status" class="select">
            <option value="">All statuses</option>
            <option>Pending</option>
            <option>Confirmed</option>
            <option>Cancelled</option>
            <option>Completed</option>
          </select>
          <input type="date" id="b-from" class="input"><input type="date" id="b-to" class="input">
          <button class="btn btn-outline btn-sm" id="b-apply">Apply</button>
        </div>
        <div id="b-table"><div class="loading">Loading…</div></div>
        <div class="pagination"><button id="b-prev" class="btn btn-outline btn-sm">←</button><span id="b-info" class="page-info">Page 1</span><button id="b-next" class="btn btn-outline btn-sm">→</button></div>
      </section>

      <!-- Services Tab -->
      <section id="tab-services" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="margin:0">Destinations</h2>
          <button class="btn btn-primary btn-sm" id="add-svc">+ Add Destination</button>
        </div>
        <div class="toolbar">
          <input id="s-search" placeholder="Search title" class="input">
          <select id="s-active" class="select"><option value="">All</option><option value="true">Active</option><option value="false">Inactive</option></select>
          <button class="btn btn-outline btn-sm" id="s-apply">Apply</button>
        </div>
        <div id="s-table"><div class="loading">Loading…</div></div>
        <div class="pagination"><button id="s-prev" class="btn btn-outline btn-sm">←</button><span id="s-info" class="page-info">Page 1</span><button id="s-next" class="btn btn-outline btn-sm">→</button></div>
      </section>

      <!-- Contacts Tab -->
      <section id="tab-contacts" style="display:none">
        <h2>Contact Messages</h2>
        <div class="toolbar">
          <input id="c-search" placeholder="Search" class="input">
          <input type="date" id="c-from" class="input"><input type="date" id="c-to" class="input">
          <button class="btn btn-outline btn-sm" id="c-apply">Apply</button>
        </div>
        <div id="c-table"><div class="loading">Loading…</div></div>
        <div class="pagination"><button id="c-prev" class="btn btn-outline btn-sm">←</button><span id="c-info" class="page-info">Page 1</span><button id="c-next" class="btn btn-outline btn-sm">→</button></div>
      </section>

      <!-- Blogs Tab -->
      <section id="tab-blogs" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="margin:0">Blogs</h2>
          <button class="btn btn-primary btn-sm" id="add-blog">+ New Article</button>
        </div>
        <div class="toolbar">
          <input id="bl-search" placeholder="Search title" class="input">
          <input id="bl-author" placeholder="Author" class="input">
          <button class="btn btn-outline btn-sm" id="bl-apply">Apply</button>
        </div>
        <div id="bl-table"><div class="loading">Loading…</div></div>
        <div class="pagination"><button id="bl-prev" class="btn btn-outline btn-sm">←</button><span id="bl-info" class="page-info">Page 1</span><button id="bl-next" class="btn btn-outline btn-sm">→</button></div>
      </section>
    </main>
  </div>
</div>

<!-- Service Modal (Add/Edit Destination) -->
<div id="serviceModal" class="modal-overlay">
  <div class="modal-container" style="max-width: 700px;">
    <div class="modal-header">
      <span class="modal-title" id="serviceModalTitle">Add Destination</span>
      <button class="modal-close" onclick="closeModal('serviceModal')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="svc-form">
        <input type="hidden" id="serviceId">
        <div class="form-grid">
          <div class="form-field"><label>Title *</label><input name="title" id="svcTitle" required class="input"></div>
          <div class="form-field"><label>Destination *</label><input name="destination" id="svcDestination" required class="input"></div>
          <div class="form-field"><label>Base price *</label><input type="number" name="base_price" id="svcPrice" required class="input"></div>
          <div class="form-field"><label>Max pax *</label><input type="number" name="max_pax" id="svcMaxPax" required class="input"></div>
          <div class="form-field full"><label>Image URL</label><input name="image_url" id="svcImageUrl" class="input"></div>
          <div class="form-field full"><label>Gallery (comma-separated URLs)</label><textarea name="gallery" id="svcGallery" rows="2" class="textarea"></textarea></div>
          <div class="form-field full"><label>Description (HTML allowed)</label><textarea name="description" id="svcDescription" rows="3" class="textarea"></textarea></div>
          <div class="form-field full"><label>Itinerary (HTML allowed)</label><textarea name="itinerary" id="svcItinerary" rows="3" class="textarea"></textarea></div>
          <div class="form-field"><label><input type="checkbox" id="svcActive" checked> Active</label></div>
        </div>
        <div class="button-group" style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1rem;">
          <button type="button" class="btn btn-outline" onclick="closeModal('serviceModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="svcSubmitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Blog Modal (Add/Edit) – uses simple textarea, no Quill -->
<div id="blogModal" class="modal-overlay">
  <div class="modal-container" style="max-width: 700px;">
    <div class="modal-header">
      <span class="modal-title" id="blogModalTitle">Add Blog</span>
      <button class="modal-close" onclick="closeModal('blogModal')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="blog-form">
        <input type="hidden" id="blogId">
        <div class="form-field"><label>Title *</label><input name="title" id="blogTitle" required class="input"></div>
        <div class="form-field"><label>Author</label><input name="author" id="blogAuthor" class="input"></div>
        <div class="form-field"><label>Cover image URL</label><input name="image_url" id="blogImageUrl" class="input"></div>
        <div class="form-field"><label>Excerpt</label><textarea name="excerpt" id="blogExcerpt" rows="2" class="textarea"></textarea></div>
        <div class="form-field"><label>Content (HTML allowed)</label><textarea name="content" id="blogContent" rows="8" class="textarea"></textarea></div>
        <div class="button-group" style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1rem;">
          <button type="button" class="btn btn-outline" onclick="closeModal('blogModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="blogSubmitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="ui.js"></script>
<script>
  // ========== Helper functions ==========
  function escapeHtml(str) { if (!str) return ""; return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function fmtDate(d) { if (!d) return "—"; try { return new Date(d).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }); } catch(e) { return d; } }
  function fmtPrice(v) { if (v == null || isNaN(Number(v))) return "—"; return "KSh " + Number(v).toLocaleString(); }
  function showAlert(el, msg, kind = "error") { if (!el) return; el.innerHTML = `<div class="alert ${kind}">${escapeHtml(msg)}</div>`; if (kind === "success") setTimeout(() => { el.innerHTML = ""; }, 6000); }
  function showToast(message, type = "info") { if (window.showToast) window.showToast(message, type); else alert(message); }

  function getCsrfToken() {
    const match = document.cookie.match(new RegExp('(^| )csrf_token=([^;]+)'));
    return match ? match[2] : null;
  }

  async function apiRequestAdmin(path, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    const method = (options.method || 'GET').toUpperCase();
    if (['POST', 'PUT', 'DELETE', 'PATCH'].includes(method)) {
      const csrf = getCsrfToken();
      if (csrf) headers['X-CSRF-Token'] = csrf;
    }
    const res = await fetch(`/api${path}`, { ...options, headers, credentials: 'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "Request failed");
    return data;
  }

  async function isAdminLoggedIn() {
    try {
      await apiRequestAdmin('/bookings?page=1&limit=1');
      return true;
    } catch(e) { return false; }
  }

  const loginView = document.getElementById("login-view");
  const dash = document.getElementById("dash");

  async function updateAdminView() {
    const loggedIn = await isAdminLoggedIn();
    loginView.style.display = loggedIn ? "none" : "flex";
    dash.style.display = loggedIn ? "block" : "none";
    if (loggedIn) {
      loadBookings();
      loadServices();
      loadContacts();
      loadBlogs();
    }
  }

  // ========== Login / Logout ==========
  document.getElementById("admin-login").addEventListener("submit", async (e) => {
    e.preventDefault();
    const payload = Object.fromEntries(new FormData(e.target).entries());
    try {
      await apiRequestAdmin("/admin/login", { method: "POST", body: JSON.stringify(payload) });
      updateAdminView();
    } catch (err) {
      showAlert(document.getElementById("login-msg"), err.message);
    }
  });

  document.getElementById("admin-logout").onclick = async () => {
    if (confirm("Log out?")) {
      try {
        await apiRequestAdmin("/auth/logout", { method: "POST" });
        updateAdminView();
        showToast("Logged out", "success");
      } catch(e) { showToast(e.message, "error"); }
    }
  };

  // ========== Tabs ==========
  document.querySelectorAll(".admin-sidebar [data-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".admin-sidebar [data-tab]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const t = btn.dataset.tab;
      ["bookings", "services", "contacts", "blogs"].forEach(k => {
        document.getElementById("tab-" + k).style.display = k === t ? "block" : "none";
      });
      if (t === "bookings") loadBookings();
      if (t === "services") loadServices();
      if (t === "contacts") loadContacts();
      if (t === "blogs") loadBlogs();
    });
  });

  // ========== Bookings ==========
  let bPage = 1, bTotalPages = 1;
  async function loadBookings() {
    const wrap = document.getElementById("b-table");
    wrap.innerHTML = `<div class="loading">Loading…</div>`;
    const params = new URLSearchParams({ page: bPage, limit: 15 });
    const q = document.getElementById("b-search").value.trim(); if (q) params.set("search", q);
    const st = document.getElementById("b-status").value; if (st) params.set("status", st);
    const from = document.getElementById("b-from").value; if (from) params.set("dateFrom", from);
    const to = document.getElementById("b-to").value; if (to) params.set("dateTo", to);
    try {
      const data = await apiRequestAdmin(`/bookings?${params.toString()}`);
      const list = data.data || [];
      const pagination = data.pagination || { totalPages: 1, currentPage: bPage };
      bTotalPages = pagination.totalPages;
      if (!list.length) { wrap.innerHTML = `<div class="empty">No bookings.</div>`; return; }
      wrap.innerHTML = `<table class="data"><thead><tr><th>Ref</th><th>Guest Name</th><th>Email / Phone / Special</th><th>Package</th><th>Travel Date</th><th>Return Date</th><th>Pax</th><th>Total</th><th>Status</th><th>Action</th></tr></thead><tbody>${list.map(b => {
        const status = (b.status || "pending").toLowerCase();
        return `<tr data-booking-id="${b.booking_id}">
          <td><span class="booking-ref">${escapeHtml(String(b.booking_reference||b.id))}</span></td>
          <td>${escapeHtml(b.guest_name||"")}</td>
          <td>${escapeHtml(b.guest_email||"")}<br>${escapeHtml(b.guest_phone||"")}<br><small>${escapeHtml(b.special_requests||"")}</small></td>
          <td>${escapeHtml(b.package_booked||"")}</td>
          <td>${fmtDate(b.travel_date)}</td>
          <td>${fmtDate(b.return_date)}</td>
          <td>${b.total_guests || b.pax || ""}</td>
          <td>${fmtPrice(b.total_amount)}</td>
          <td class="status-cell"><span class="status ${status}">${status}</span></td>
          <td>
            <select data-id="${b.booking_id}" class="status-sel select" style="width:auto; display:inline-block;">
              <option ${status === "pending" ? "selected" : ""}>Pending</option>
              <option ${status === "confirmed" ? "selected" : ""}>Confirmed</option>
              <option ${status === "cancelled" ? "selected" : ""}>Cancelled</option>
              <option ${status === "completed" ? "selected" : ""}>Completed</option>
            </select>
            <button class="btn btn-sm btn-outline update-btn" data-id="${b.booking_id}">Update</button>
          </td>
        </tr>`;
      }).join("")}</tbody></table>`;
      document.getElementById("b-info").textContent = `Page ${pagination.currentPage} of ${bTotalPages}`;
    } catch (e) { wrap.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }
  }

  document.getElementById("b-table").addEventListener("click", async (e) => {
    const btn = e.target.closest(".update-btn");
    if (btn) {
      const id = btn.dataset.id;
      const select = document.querySelector(`.status-sel[data-id="${id}"]`);
      const newStatus = select.value;
      try {
        await apiRequestAdmin(`/bookings/${id}`, { method: "PUT", body: JSON.stringify({ status: newStatus }) });
        showToast(`Booking status updated to ${newStatus}`, "success");
        loadBookings();
      } catch (err) { showToast(err.message, "error"); }
    }
  });

  document.getElementById("b-apply").onclick = () => { bPage = 1; loadBookings(); };
  document.getElementById("b-prev").onclick = () => { if (bPage > 1) { bPage--; loadBookings(); } };
  document.getElementById("b-next").onclick = () => { if (bPage < bTotalPages) { bPage++; loadBookings(); } };

  // ========== Services ==========
  let sPage = 1, sTotalPages = 1;
  async function loadServices() {
    const wrap = document.getElementById("s-table");
    wrap.innerHTML = `<div class="loading">Loading…</div>`;
    const params = new URLSearchParams({ page: sPage, limit: 15 });
    const q = document.getElementById("s-search").value.trim(); if (q) params.set("search", q);
    const a = document.getElementById("s-active").value; if (a) params.set("is_active", a);
    try {
      const data = await apiRequestAdmin(`/admin/services?${params.toString()}`);
      const list = data.data || [];
      const pagination = data.pagination || { totalPages: 1, currentPage: sPage };
      sTotalPages = pagination.totalPages;
      if (!list.length) { wrap.innerHTML = `<div class="empty">No destinations.</div>`; return; }
      wrap.innerHTML = `<table class="data"><thead><tr><th>Title</th><th>Destination</th><th>Price</th><th>Max Pax</th><th>Active</th><th>Actions</th></tr></thead><tbody>${list.map(s => `<tr>
        <td>${escapeHtml(s.title || "")}</td>
        <td>${escapeHtml(s.destination || "")}</td>
        <td>${fmtPrice(s.base_price)}</td>
        <td>${escapeHtml(String(s.max_pax || "—"))}</td>
        <td>${s.is_active === false ? "No" : "Yes"}</td>
        <td><button class="btn btn-sm btn-outline edit-svc" data-id="${s.service_id}">Edit</button>
        <button class="btn btn-sm btn-outline del-svc" data-id="${s.service_id}">Delete</button></td>
      </tr>`).join("")}</tbody></table>`;
      document.getElementById("s-info").textContent = `Page ${pagination.currentPage} of ${sTotalPages}`;
    } catch (e) { wrap.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }
  }

  document.getElementById("s-table").addEventListener("click", async (e) => {
    const editBtn = e.target.closest(".edit-svc");
    if (editBtn) {
      const id = editBtn.dataset.id;
      try {
        const data = await apiRequestAdmin(`/admin/services/${id}`);
        const svc = data.data || data;
        document.getElementById("serviceModalTitle").innerText = "Edit Destination";
        document.getElementById("serviceId").value = svc.service_id;
        document.getElementById("svcTitle").value = svc.title || "";
        document.getElementById("svcDestination").value = svc.destination || "";
        document.getElementById("svcPrice").value = svc.base_price || "";
        document.getElementById("svcMaxPax").value = svc.max_pax || 10;
        document.getElementById("svcImageUrl").value = svc.image_url || "";
        document.getElementById("svcDescription").value = svc.description || "";
        document.getElementById("svcItinerary").value = svc.itinerary || "";
        document.getElementById("svcGallery").value = (svc.gallery || []).join(", ");
        document.getElementById("svcActive").checked = svc.is_active !== false;
        openModal("serviceModal");
      } catch (err) { showToast(err.message, "error"); }
      return;
    }
    const delBtn = e.target.closest(".del-svc");
    if (delBtn) {
      if (confirm("Delete this destination permanently?")) {
        const id = delBtn.dataset.id;
        try {
          await apiRequestAdmin(`/admin/services/${id}`, { method: "DELETE" });
          loadServices();
          showToast("Destination deleted", "success");
        } catch (err) { showToast(err.message, "error"); }
      }
    }
  });

  document.getElementById("add-svc").onclick = () => {
    document.getElementById("serviceModalTitle").innerText = "Add Destination";
    document.getElementById("serviceId").value = "";
    document.getElementById("svcTitle").value = "";
    document.getElementById("svcDestination").value = "";
    document.getElementById("svcPrice").value = "";
    document.getElementById("svcMaxPax").value = "10";
    document.getElementById("svcImageUrl").value = "";
    document.getElementById("svcDescription").value = "";
    document.getElementById("svcItinerary").value = "";
    document.getElementById("svcGallery").value = "";
    document.getElementById("svcActive").checked = true;
    openModal("serviceModal");
  };
  document.getElementById("s-apply").onclick = () => { sPage = 1; loadServices(); };
  document.getElementById("s-prev").onclick = () => { if (sPage > 1) { sPage--; loadServices(); } };
  document.getElementById("s-next").onclick = () => { if (sPage < sTotalPages) { sPage++; loadServices(); } };

  document.getElementById("svc-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("serviceId").value;
    const payload = {
      title: document.getElementById("svcTitle").value,
      destination: document.getElementById("svcDestination").value,
      base_price: parseFloat(document.getElementById("svcPrice").value),
      max_pax: parseInt(document.getElementById("svcMaxPax").value),
      image_url: document.getElementById("svcImageUrl").value,
      description: document.getElementById("svcDescription").value,
      itinerary: document.getElementById("svcItinerary").value,
      gallery: document.getElementById("svcGallery").value.split(",").map(s => s.trim()).filter(Boolean),
      is_active: document.getElementById("svcActive").checked
    };
    try {
      if (id) await apiRequestAdmin(`/admin/services/${id}`, { method: "PUT", body: JSON.stringify(payload) });
      else await apiRequestAdmin("/admin/services", { method: "POST", body: JSON.stringify(payload) });
      closeModal("serviceModal");
      loadServices();
      showToast(id ? "Destination updated" : "Destination created", "success");
    } catch (err) { showToast(err.message, "error"); }
  });

  // ========== Contacts ==========
  let cPage = 1, cTotalPages = 1;
  async function loadContacts() {
    const wrap = document.getElementById("c-table");
    wrap.innerHTML = `<div class="loading">Loading…</div>`;
    const params = new URLSearchParams({ page: cPage, limit: 15 });
    const q = document.getElementById("c-search").value.trim(); if (q) params.set("search", q);
    const from = document.getElementById("c-from").value; if (from) params.set("dateFrom", from);
    const to = document.getElementById("c-to").value; if (to) params.set("dateTo", to);
    try {
      const data = await apiRequestAdmin(`/contact?${params.toString()}`);
      const list = data.data || [];
      const pagination = data.pagination || { totalPages: 1, currentPage: cPage };
      cTotalPages = pagination.totalPages;
      if (!list.length) { wrap.innerHTML = `<div class="empty">No messages.</div>`; return; }
      wrap.innerHTML = `<table class="data"><thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th></tr></thead><tbody>${list.map(c => `<tr><td>${fmtDate(c.created_at)}</td><td>${escapeHtml(c.name || "")}</td><td>${escapeHtml(c.email || "")}</td><td>${escapeHtml(c.subject || "")}</td><td>${escapeHtml(c.message || "")}</td></tr>`).join("")}</tbody></table>`;
      document.getElementById("c-info").textContent = `Page ${pagination.currentPage} of ${cTotalPages}`;
    } catch (e) { wrap.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }
  }
  document.getElementById("c-apply").onclick = () => { cPage = 1; loadContacts(); };
  document.getElementById("c-prev").onclick = () => { if (cPage > 1) { cPage--; loadContacts(); } };
  document.getElementById("c-next").onclick = () => { if (cPage < cTotalPages) { cPage++; loadContacts(); } };

  // ========== Blogs (with textarea, no Quill) ==========
  let blPage = 1, blTotalPages = 1;
  async function loadBlogs() {
    const wrap = document.getElementById("bl-table");
    wrap.innerHTML = `<div class="loading">Loading…</div>`;
    const params = new URLSearchParams({ page: blPage, limit: 15 });
    const q = document.getElementById("bl-search").value.trim(); if (q) params.set("search", q);
    const a = document.getElementById("bl-author").value.trim(); if (a) params.set("author", a);
    try {
      const data = await apiRequestAdmin(`/blogs?${params.toString()}`);
      const list = data.blogs || [];
      const pagination = data.pagination || { totalPages: 1, currentPage: blPage };
      blTotalPages = pagination.totalPages;
      if (!list.length) { wrap.innerHTML = `<div class="empty">No articles.</div>`; return; }
      wrap.innerHTML = `<table class="data"><thead><tr><th>Title</th><th>Author</th><th>Date</th><th>Actions</th></tr></thead><tbody>${list.map(b => `<tr>
        <td>${escapeHtml(b.title || "")}</td>
        <td>${escapeHtml(b.author || "")}</td>
        <td>${fmtDate(b.created_at)}</td>
        <td><button class="btn btn-sm btn-outline edit-blog" data-id="${b.id}">Edit</button>
        <button class="btn btn-sm btn-outline del-blog" data-id="${b.id}">Delete</button></td>
      </tr>`).join("")}</tbody></table>`;
      document.getElementById("bl-info").textContent = `Page ${pagination.currentPage} of ${blTotalPages}`;
    } catch (e) { wrap.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }
  }

  // Event delegation for blog edit/delete
  const blTable = document.getElementById("bl-table");
  blTable.addEventListener("click", async (e) => {
    const editBtn = e.target.closest(".edit-blog");
    if (editBtn) {
      const id = editBtn.dataset.id;
      try {
        const data = await apiRequestAdmin(`/blogs/${id}`);
        const blog = data.data || data;
        document.getElementById("blogModalTitle").innerText = "Edit Blog";
        document.getElementById("blogId").value = blog.id;
        document.getElementById("blogTitle").value = blog.title || "";
        document.getElementById("blogAuthor").value = blog.author || "";
        document.getElementById("blogImageUrl").value = blog.image_url || "";
        document.getElementById("blogExcerpt").value = blog.excerpt || "";
        document.getElementById("blogContent").value = blog.content || "";
        openModal("blogModal");
      } catch (err) { showToast(err.message, "error"); }
      return;
    }
    const delBtn = e.target.closest(".del-blog");
    if (delBtn) {
      if (confirm("Delete this blog?")) {
        const id = delBtn.dataset.id;
        try {
          await apiRequestAdmin(`/blogs/${id}`, { method: "DELETE" });
          loadBlogs();
          showToast("Blog deleted", "success");
        } catch (err) { showToast(err.message, "error"); }
      }
    }
  });

  document.getElementById("add-blog").onclick = () => {
    document.getElementById("blogModalTitle").innerText = "New Article";
    document.getElementById("blogId").value = "";
    document.getElementById("blogTitle").value = "";
    document.getElementById("blogAuthor").value = "";
    document.getElementById("blogImageUrl").value = "";
    document.getElementById("blogExcerpt").value = "";
    document.getElementById("blogContent").value = "";
    openModal("blogModal");
  };

  document.getElementById("blog-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("blogId").value;
    const payload = {
      title: document.getElementById("blogTitle").value,
      author: document.getElementById("blogAuthor").value,
      image_url: document.getElementById("blogImageUrl").value,
      excerpt: document.getElementById("blogExcerpt").value,
      content: document.getElementById("blogContent").value
    };
    try {
      if (id) await apiRequestAdmin(`/blogs/${id}`, { method: "PUT", body: JSON.stringify(payload) });
      else await apiRequestAdmin("/blogs", { method: "POST", body: JSON.stringify(payload) });
      closeModal("blogModal");
      loadBlogs();
      showToast(id ? "Blog updated" : "Blog published", "success");
    } catch (err) { showToast(err.message, "error"); }
  });

  // Image upload for blog cover
  document.getElementById("blogImageUrl")?.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const formData = new FormData();
      formData.append("image", file);
      const token = getCsrfToken();
      const headers = {};
      if (token) headers['X-CSRF-Token'] = token;
      const res = await fetch("/api/upload", { method: "POST", headers, body: formData, credentials: 'include' });
      const data = await res.json();
      if (data.url) document.getElementById("blogImageUrl").value = data.url;
    } catch (err) { showToast(err.message, "error"); }
  });

  document.getElementById("bl-apply").onclick = () => { blPage = 1; loadBlogs(); };
  document.getElementById("bl-prev").onclick = () => { if (blPage > 1) { blPage--; loadBlogs(); } };
  document.getElementById("bl-next").onclick = () => { if (blPage < blTotalPages) { blPage++; loadBlogs(); } };

  function openModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.style.display = "flex";
  }
  function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.style.display = "none";
  }

  updateAdminView();
</script>
</body>
</html>
