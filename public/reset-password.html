<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EscoConcepts Travels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7f6; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .container { max-width: 450px; width: 100%; background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 1rem; }
        input, button { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { background: #e67e22; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #d35400; }
        .error { color: #e74c3c; margin-bottom: 1rem; }
        .success { color: #2ecc71; margin-bottom: 1rem; }
        .back-link { text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <h2>Reset Your Password</h2>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    <form id="resetForm">
        <input type="password" id="newPassword" placeholder="New password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
        <button type="submit">Reset Password</button>
    </form>
    <div class="back-link">
        <a href="account.html">Back to Login</a>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const form = document.getElementById('resetForm');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');

    if (!token) {
        errorDiv.innerText = 'No reset token found. Please request a new password reset link.';
        form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.innerText = '';
        successDiv.innerText = '';
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (newPassword !== confirmPassword) {
            errorDiv.innerText = 'Passwords do not match.';
            return;
        }
        if (newPassword.length < 6) {
            errorDiv.innerText = 'Password must be at least 6 characters long.';
            return;
        }
        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await response.json();
            if (data.success) {
                successDiv.innerHTML = data.message + ' <a href="account.html">Click here to log in</a>.';
                form.reset();
            } else {
                errorDiv.innerText = data.message;
            }
        } catch (err) {
            errorDiv.innerText = 'Server error. Please try again later.';
        }
    });
</script>
</body>
</html>
