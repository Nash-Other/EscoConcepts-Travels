<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | EscoConcepts Travels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7f6; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .container { max-width: 800px; width: 100%; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 2rem; }
        .nav { margin-bottom: 2rem; text-align: center; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
        .nav a { color: #3498db; text-decoration: none; margin: 0 1rem; }
        .nav a:hover { text-decoration: underline; }
        h2, h3 { color: #2c3e50; margin-bottom: 1rem; }
        input, button { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { background: #e67e22; color: white; font-weight: bold; cursor: pointer; border: none; transition: background 0.3s; }
        button:hover { background: #d35400; }
        .toggle { text-align: center; margin-top: 1rem; }
        .toggle a { color: #3498db; cursor: pointer; }
        .error { color: #e74c3c; margin-bottom: 1rem; }
        .success { color: #2ecc71; margin-bottom: 1rem; }
        .info { color: #3498db; margin-bottom: 1rem; }
        .booking-card {
            background: #f9f9f9;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border-left: 4px solid #e67e22;
        }
        .booking-actions {
            margin-top: 1rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .booking-actions button { flex: 1; margin: 0; padding: 0.5rem; font-size: 0.9rem; }
        .cancel-btn { background-color: #e74c3c; }
        .cancel-btn:hover { background-color: #c0392b; }
        .receipt-btn { background-color: #3498db; }
        .receipt-btn:hover { background-color: #2980b9; }
        .logout { background-color: #95a5a6; margin-top: 1rem; }
        .logout:hover { background-color: #7f8c8d; }
        .profile-section {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .profile-info { margin-bottom: 1rem; }
        .profile-info p { margin: 0.5rem 0; }
        .edit-profile-form { display: none; margin-top: 1rem; border-top: 1px solid #ccc; padding-top: 1rem; }
        .edit-profile-form input { margin-bottom: 0.8rem; }
        hr { margin: 1rem 0; }
        .print-only { display: none; }
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 1rem; }
            .booking-actions, .logout, .nav, .profile-section { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Home</a> | 
        <a href="checkout.html">Book Now</a> | 
        <a href="destinations.html">Destinations</a> | 
        <a href="account.html">My Account</a>
    </div>

    <!-- Login / Signup Section -->
    <div id="authSection">
        <h2 id="formTitle">Login</h2>
        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>
        <form id="authForm">
            <div id="nameFields" style="display:none;">
                <input type="text" id="firstName" placeholder="First Name *">
                <input type="text" id="lastName" placeholder="Last Name *">
                <input type="tel" id="phone" placeholder="Phone (optional)">
            </div>
            <input type="email" id="email" placeholder="Email *">
            <input type="password" id="password" placeholder="Password *">
            <button type="submit" id="submitBtn">Login</button>
        </form>
        <div class="toggle">
            <a id="toggleLink">Don't have an account? Sign up</a><br>
            <a href="forgot-password.html" style="font-size: 0.9rem;">Forgot password?</a>
        </div>
    </div>

    <!-- Dashboard after login -->
    <div id="dashboardSection" style="display:none;">
        <div class="profile-section">
            <h3>My Profile</h3>
            <div id="profileDisplay" class="profile-info">
                <p><strong>Name:</strong> <span id="profileName"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <p><strong>Phone:</strong> <span id="profilePhone"></span></p>
                <button id="editProfileBtn" class="receipt-btn" style="background-color:#3498db;">Edit Profile</button>
            </div>
            <div id="editProfileForm" class="edit-profile-form">
                <input type="text" id="editFirstName" placeholder="First Name">
                <input type="text" id="editLastName" placeholder="Last Name">
                <input type="tel" id="editPhone" placeholder="Phone">
                <input type="email" id="editEmail" placeholder="Email">
                <button id="saveProfileBtn">Save Changes</button>
                <button id="cancelEditBtn" style="background-color:#95a5a6;">Cancel</button>
                <div id="profileError" class="error"></div>
                <div id="profileSuccess" class="success"></div>
            </div>
        </div>

        <h3>My Bookings</h3>
        <div id="bookingsList" class="booking-list">Loading your bookings...</div>
        <hr>
        <button id="logoutBtn" class="logout">Logout</button>
    </div>
</div>

<script>
    const API_BASE = '';
    let isLogin = true;
    let currentUser = null;

    function showError(divId, msg) { const div = document.getElementById(divId); if(div) div.innerText = msg; setTimeout(() => { if(div) div.innerText = ''; }, 5000); }
    function showSuccess(divId, msg) { const div = document.getElementById(divId); if(div) div.innerText = msg; setTimeout(() => { if(div) div.innerText = ''; }, 3000); }

    async function handleAuth(e) {
        e.preventDefault();
        showError('errorMsg', '');
        showSuccess('successMsg', '');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showError('errorMsg', 'Email and password are required.'); return; }
        if (isLogin) {
            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('customerToken', data.token);
                    localStorage.setItem('customerRole', data.role);
                    localStorage.setItem('customerEmail', email);
                    showSuccess('successMsg', 'Login successful!');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    showError('errorMsg', data.message);
                }
            } catch (err) { showError('errorMsg', 'Server error.'); }
        } else {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!firstName || !lastName) { showError('errorMsg', 'First name and last name are required.'); return; }
            try {
                const res = await fetch(`${API_BASE}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phone, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('customerToken', data.token);
                    localStorage.setItem('customerRole', 'customer');
                    localStorage.setItem('customerEmail', email);
                    showSuccess('successMsg', 'Account created! You are now logged in.');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    showError('errorMsg', data.message);
                }
            } catch (err) { showError('errorMsg', 'Server error.'); }
        }
    }

    async function loadUserProfile() {
        const token = localStorage.getItem('customerToken');
        if (!token) return;
        try {
            const res = await fetch(`${API_BASE}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                if (data.success) {
                    currentUser = data.user;
                    document.getElementById('profileName').innerText = `${data.user.first_name} ${data.user.last_name}`;
                    document.getElementById('profileEmail').innerText = data.user.email;
                    document.getElementById('profilePhone').innerText = data.user.phone || '—';
                    document.getElementById('editFirstName').value = data.user.first_name;
                    document.getElementById('editLastName').value = data.user.last_name;
                    document.getElementById('editPhone').value = data.user.phone || '';
                    document.getElementById('editEmail').value = data.user.email;
                }
            }
        } catch (err) { console.error('Failed to load profile:', err); }
    }

    async function loadBookings() {
        const token = localStorage.getItem('customerToken');
        if (!token) return;
        try {
            const res = await fetch(`${API_BASE}/api/bookings/my-bookings`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const container = document.getElementById('bookingsList');
            if (data.success && data.data && data.data.length) {
                container.innerHTML = data.data.map(b => `
                    <div class="booking-card" data-id="${b.booking_id}" data-ref="${b.booking_reference}" data-package="${b.package_name}" data-date="${b.travel_date}" data-pax="${b.pax}" data-amount="${b.total_amount}" data-status="${b.status}">
                        <strong>${b.booking_reference}</strong><br>
                        Package: ${b.package_name}<br>
                        Travel Date: ${new Date(b.travel_date).toLocaleDateString()}<br>
                        Guests: ${b.pax}<br>
                        Total: KES ${Number(b.total_amount).toLocaleString()}<br>
                        Status: ${b.status}
                        <div class="booking-actions">
                            ${b.status === 'Pending' ? `<button class="cancel-btn" onclick="cancelBooking('${b.booking_id}')">Cancel Booking</button>` : ''}
                            <button class="receipt-btn" onclick="downloadInvoice('${b.booking_id}')">Download Invoice (PDF)</button>
                            <button class="receipt-btn" onclick="emailReceipt('${b.booking_id}')">Email Receipt</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p>You have no bookings yet. <a href="checkout.html">Book a trip now</a>.</p>';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('bookingsList').innerHTML = '<p>Failed to load your bookings.</p>';
        }
    }

    async function updateProfile() {
        const token = localStorage.getItem('customerToken');
        if (!token) return;
        const firstName = document.getElementById('editFirstName').value.trim();
        const lastName = document.getElementById('editLastName').value.trim();
        const phone = document.getElementById('editPhone').value.trim();
        const email = document.getElementById('editEmail').value.trim();
        if (!firstName || !lastName || !email) {
            showError('profileError', 'First name, last name, and email are required.');
            return;
        }
        try {
            const res = await fetch(`${API_BASE}/api/auth/profile`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ firstName, lastName, phone, email })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('customerToken', data.token);
                localStorage.setItem('customerEmail', email);
                showSuccess('profileSuccess', 'Profile updated successfully!');
                setTimeout(() => window.location.reload(), 1500);
            } else {
                showError('profileError', data.message);
            }
        } catch (err) {
            showError('profileError', 'Server error.');
        }
    }

    function cancelEdit() {
        document.getElementById('editProfileForm').style.display = 'none';
        document.getElementById('profileDisplay').style.display = 'block';
    }

    function showEditForm() {
        document.getElementById('profileDisplay').style.display = 'none';
        document.getElementById('editProfileForm').style.display = 'block';
        document.getElementById('profileError').innerText = '';
        document.getElementById('profileSuccess').innerText = '';
    }

    async function cancelBooking(bookingId) {
        if (!confirm('Cancel this booking? This action cannot be undone.')) return;
        const token = localStorage.getItem('customerToken');
        try {
            const res = await fetch(`${API_BASE}/api/bookings/cancel/${bookingId}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) {
                alert('Booking cancelled.');
                loadBookings();
            } else {
                alert(data.message);
            }
        } catch (err) { alert('Error cancelling.'); }
    }

    async function downloadInvoice(bookingId) {
        const card = document.querySelector(`.booking-card[data-id='${bookingId}']`);
        if (!card) return;
        const ref = card.dataset.ref;
        const packageName = card.dataset.package;
        const travelDate = new Date(card.dataset.date).toLocaleDateString();
        const pax = card.dataset.pax;
        const amount = Number(card.dataset.amount).toLocaleString();
        const status = card.dataset.status;
        const userName = document.getElementById('profileName').innerText;
        const now = new Date().toLocaleString();
        const html = `
            <div class="print-area" style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
                <h2>EscoConcepts Travels</h2>
                <h3>Booking Invoice</h3>
                <p><strong>Invoice Date:</strong> ${now}</p>
                <p><strong>Customer:</strong> ${userName}</p>
                <hr>
                <p><strong>Booking Reference:</strong> ${ref}</p>
                <p><strong>Package:</strong> ${packageName}</p>
                <p><strong>Travel Date:</strong> ${travelDate}</p>
                <p><strong>Guests:</strong> ${pax}</p>
                <p><strong>Total Amount:</strong> KES ${amount}</p>
                <p><strong>Status:</strong> ${status}</p>
                <hr>
                <p>Thank you for choosing EscoConcepts Travels.</p>
            </div>
        `;
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`<html><head><title>Invoice ${ref}</title><style>body{margin:0;padding:0;}</style></head><body>${html}</body></html>`);
        printWindow.document.close();
        printWindow.print();
    }

    async function emailReceipt(bookingId) {
        const token = localStorage.getItem('customerToken');
        try {
            const res = await fetch(`${API_BASE}/api/bookings/receipt/${bookingId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) alert('Receipt sent to your email.');
            else alert(data.message);
        } catch (err) { alert('Failed to send receipt.'); }
    }

    function logout() {
        localStorage.removeItem('customerToken');
        localStorage.removeItem('customerRole');
        localStorage.removeItem('customerEmail');
        window.location.reload();
    }

    // Check login status on page load
    const token = localStorage.getItem('customerToken');
    if (token) {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        loadUserProfile();
        loadBookings();
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('editProfileBtn').addEventListener('click', showEditForm);
        document.getElementById('saveProfileBtn').addEventListener('click', updateProfile);
        document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);
    } else {
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('authForm').addEventListener('submit', handleAuth);
        document.getElementById('toggleLink').addEventListener('click', toggleForm);
        isLogin = true;
        document.getElementById('nameFields').style.display = 'none';
        document.getElementById('firstName').required = false;
        document.getElementById('lastName').required = false;
    }

    function toggleForm() {
        isLogin = !isLogin;
        const title = document.getElementById('formTitle');
        const btn = document.getElementById('submitBtn');
        const toggleLink = document.getElementById('toggleLink');
        const nameFields = document.getElementById('nameFields');
        if (isLogin) {
            title.innerText = 'Login';
            btn.innerText = 'Login';
            toggleLink.innerText = "Don't have an account? Sign up";
            nameFields.style.display = 'none';
            document.getElementById('firstName').required = false;
            document.getElementById('lastName').required = false;
        } else {
            title.innerText = 'Sign Up';
            btn.innerText = 'Sign Up';
            toggleLink.innerText = 'Already have an account? Login';
            nameFields.style.display = 'block';
            document.getElementById('firstName').required = true;
            document.getElementById('lastName').required = true;
        }
    }
</script>
</body>
</html>
